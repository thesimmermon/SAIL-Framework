<!doctype html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="../sail-logo.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAIL Specification | Software Architecture Iconographic Language</title>
  <meta name="description" content="The formal Software Architecture Iconographic Language Specification.">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Reader Layout Styles */
    html,
    body {
      height: 100vh;
      overflow: hidden;
      /* Prevent body scroll */
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
    }

    .reader-header {
      flex: 0 0 auto;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .reader-header .left-nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .reader-header h1 {
      font-size: 1.5rem;
      margin: 0;
      color: var(--text);
      background: none;
      -webkit-text-fill-color: var(--text);
    }

    .reader-container {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .reader-content-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <nav class="reader-header" aria-label="Primary">
    <a class="brand" href="../">
      <img src="../sail-logo.png" alt="SAIL Logo" class="brand-logo" />
      SAIL Framework
    </a>
    <div class="links">
      <a href="../">Home</a>
      <a href="./">Specification</a>
      <a href="../examples/">Examples</a>
      <a href="../book/">Book</a>
      <a href="../book/#downloads">Downloads</a>
      <a href="https://github.com/thesimmermon/SAIL-Framework" target="_blank" rel="noopener">GitHub Repo</a>
      <a class="button primary" href="SAILSpecification.pdf" download
        style="min-height: auto; padding: 8px 16px; color: #fff;">Download PDF</a>
    </div>
  </nav>

  <main class="reader-container">
    <div id="loading">Loading Specification...</div>
    <div class="reader-content-wrapper">
      <div id="content" style="display: none; margin-top: 0;"></div>
    </div>
  </main>

  <script>
    fetch('SAIL-Specification.md')
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.text();
      })
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      })
      .catch(error => {
        document.getElementById('loading').innerText = 'Error loading specification: ' + error.message;
      });
  </script>
</body>

</html>
